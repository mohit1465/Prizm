<!DOCTYPE html>
<html>
<head>
    <title>Prizm Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .container {
            text-align: center;
        }
        h1 {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Prizm Test App</h1>
        <p>This is a minimal test application.</p>
        <p>Node.js version: <span id="node-version"></span></p>
        <p>Electron version: <span id="electron-version"></span></p>
    </div>

    <script>
        // You can also access Node.js APIs in the renderer process
        document.getElementById('node-version').textContent = process.versions.node;
        document.getElementById('electron-version').textContent = process.versions.electron;
    </script>
</body>
</html>
